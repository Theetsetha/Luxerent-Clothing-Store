<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Booking | LuxeRent</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>
    <nav><div class="logo">LUXE<span>RENT</span></div></nav>

    <div class="booking-wrapper">
        <div class="booking-card">
            <h2>Reserve Your Style</h2>
            <div id="summary" class="booking-summary">
                <p>Item: <strong id="item-name">-</strong></p>
                <p>Total: <strong id="item-price">₹0</strong></p>
            </div>
            <form id="payForm">
                <div class="input-group">
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <label>Pickup Date</label>
                    <input type="date" required>
                </div>
                <button type="submit" class="confirm-btn">Confirm & Pay</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
